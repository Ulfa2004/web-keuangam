<!DOCTYPE html>
<html lang=id>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width, initial-scale=1.0>
  <title>Symphony - Liquid Glass Music Player</title>
  <link rel=stylesheet href=style.css>
</head>
<body>

  <div class=liquid-bg>
    <div class=blob blob-1></div>
    <div class=blob blob-2></div>
    <div class=blob blob-3></div>
  </div>

  <div id=login-screen class=glass-card active>
    <div class=login-header>
      <div class=logo-icon>🎵</div>
      <h2>Symphony Premium</h2>
      <p>Masukkan akses admin untuk streaming</p>
    </div>
    <form id=login-form>
      <div class=input-group>
        <label>Username</label>
        <input type=text id=login-user placeholder=Nama kamu... required>
      </div>
      <div class=input-group>
        <label>Admin Access Code</label>
        <input type=password id=login-code placeholder=•••••••• required>
      </div>
      <p id=login-error class=error-msg></p>
      <button type=submit class=btn-primary>Masuk ke Aplikasi</button>
    </form>
  </div>

  <div id=main-dashboard class=glass-container>
    
    <aside class=sidebar>
      <div class=brand>🎵 Symphony</div>
      <nav class=nav-menu>
        <button class=nav-btn active data-tab=home>🏠 Home</button>
        <button class=nav-btn data-tab=playlists>📚 Playlists</button>
        <button class=nav-btn data-tab=upload>📤 Upload Music</button>
      </nav>
      <button id=logout-btn class=btn-logout>🚪 Keluar</button>
    </aside>

    <main class=main-content>
      
      <section id=tab-home class=tab-content active>
        <div class=content-header>
          <h2 id=welcome-msg>Selamat Datang</h2>
          <h1>Daftar Lagu Terbaru</h1>
        </div>
        <div class=songs-grid id=songs-list>
          </div>
      </section>

      <section id=tab-playlists class=tab-content>
        <div class=content-header>
          <h1>Koleksi Playlist</h1>
        </div>
        <form id=playlist-form class=inline-form>
          <input type=text id=playlist-name-input placeholder=Nama Playlist Baru... required>
          <button type=submit class=btn-primary>Buat</button>
        </form>
        <div class=playlists-grid id=playlists-list></div>
        
        <div id=playlist-detail class=playlist-detail-box style=display:none;>
          <h2 id=selected-playlist-title>Nama Playlist</h2>
          <div class=playlist-songs id=playlist-songs-items></div>
        </div>
      </section>

      <section id=tab-upload class=tab-content>
        <div class=content-header>
          <h1>Unggah Musik ke GitHub</h1>
          <p style=color: #ccc; font-size: 13px;>File akan di-convert dan disimpan langsung di GitHub Repository.</p>
        </div>
        <form id=upload-form class=glass-form>
          <div class=input-group>
            <label>Judul Lagu</label>
            <input type=text id=up-title placeholder=Judul lagu... required>
          </div>
          <div class=input-group>
            <label>Nama Artis</label>
            <input type=text id=up-artist placeholder=Nama penyanyi/band... required>
          </div>
          <div class=form-row>
            <div class=input-group>
              <label>File MP3</label>
              <input type=file id=up-audio accept=audio/mp3 required>
            </div>
            <div class=input-group>
              <label>File Gambar Cover</label>
              <input type=file id=up-cover accept=image/* required>
            </div>
          </div>
          <div id=upload-status class=status-box style=display:none;></div>
          <button type=submit id=upload-submit class=btn-primary>Mulai Upload</button>
        </form>
      </section>

    </main>
  </div>

  <footer id=player-bar class=player-bar style=display:none;>
    <audio id=main-audio></audio>
    
    <div class=player-track-info>
      <img id=player-cover src= alt=Cover>
      <div class=track-text>
        <h4 id=player-title class=truncate>Judul Lagu</h4>
        <p id=player-artist class=truncate>Artis</p>
      </div>
    </div>

    <div class=player-controls>
      <div class=control-buttons>
        <button id=btn-shuffle title=Shuffle>🔀</button>
        <button id=btn-prev>⏮</button>
        <button id=btn-play-pause class=play-trigger>▶</button>
        <button id=btn-next>⏭</button>
        <button id=btn-loop title=Loop>🔁</button>
      </div>
      <div class=timeline-container>
        <span id=time-current>0:00</span>
        <input type=range id=timeline min=0 max=100 value=0>
        <span id=time-duration>0:00</span>
      </div>
    </div>

    <div class=player-volume>
      <span>🔊</span>
      <input type=range id=volume-slider min=0 max=1 step=0.05 value=0.7>
    </div>
  </footer>

</body>
</html>
